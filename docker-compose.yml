services:
  api:
    build: .
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./elastisched.db
    volumes:
      - ./:/app
      - ../elastisched.db:/app/elastisched.db
      - ../analytics.db:/app/analytics.db
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
