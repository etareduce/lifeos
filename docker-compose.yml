services:
  api:
    build: .
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/lifeos.db
      ANALYTICS_DATABASE_URL: sqlite+aiosqlite:////app/data/analytics.db
    volumes:
      - ./:/app
      - ./data:/app/data
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
