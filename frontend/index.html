<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LifeOS</title>
    <link rel="stylesheet" href="./css/lifeos.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="LifeOS navigation">
        <div class="brand">
          <div class="brand-title">LifeOS</div>
          <div class="brand-subtitle">Capture first. Structure later.</div>
        </div>
        <nav class="nav-list">
          <button class="nav-item active" type="button" data-view="home">Home</button>
          <button class="nav-item" type="button" data-view="review">
            <span>Review</span>
            <span class="review-badge" id="reviewBadge">0</span>
          </button>
          <button class="nav-item" type="button" data-view="goals">Goals</button>
          <button class="nav-item" type="button" data-view="types">Type</button>
          <button class="nav-item" type="button" data-view="objects">Objects</button>
          <button class="nav-item" type="button" data-view="timeline">Timeline</button>
        </nav>
      </aside>

      <main class="workspace">
        <section class="view active" id="homeView" aria-labelledby="homeTitle">
          <h1 id="homeTitle" class="sr-only">Home</h1>
          <div class="capture-surface" id="captureForm">
            <textarea
              id="captureInput"
              rows="24"
              placeholder=""
              autofocus
              spellcheck="true"
            ></textarea>
            <span id="captureStatus" class="status sr-only" role="status"></span>
          </div>
        </section>

        <section class="view" id="reviewView" aria-labelledby="reviewTitle">
          <div class="view-header review-header">
            <button class="back-button" type="button" id="reviewBackBtn" aria-label="Back to Review">←</button>
            <h1 id="reviewTitle">Review</h1>
          </div>
          <div class="review-layout" id="reviewLayout">
            <div class="review-queue" id="reviewQueue"></div>
          </div>
          <textarea
            class="review-full-editor"
            id="reviewFullEditor"
            rows="24"
            spellcheck="true"
          ></textarea>
        </section>

        <section class="view" id="goalsView" aria-labelledby="goalsTitle">
          <div class="view-header">
            <h1 id="goalsTitle">Goals</h1>
            <button class="primary" type="button" id="newGoalBtn">New Goal</button>
          </div>
          <div class="goal-grid" id="goalsList"></div>
        </section>

        <section class="view" id="typesView" aria-labelledby="typesTitle">
          <div class="view-header">
            <h1 id="typesTitle">Type</h1>
          </div>
          <div class="types-layout">
            <form class="type-form" id="typeForm">
              <label>
                Name
                <input id="typeNameInput" name="name" type="text" autocomplete="off" required />
              </label>
              <label>
                Kind
                <select id="typeKindInput" name="kind">
                  <option value="group">Group</option>
                  <option value="list">List</option>
                  <option value="Text">Text</option>
                  <option value="Number">Number</option>
                  <option value="Boolean">Boolean</option>
                  <option value="Date">Date</option>
                  <option value="Image">Image</option>
                  <option value="Video">Video</option>
                  <option value="Blob">Blob</option>
                </select>
              </label>
              <label id="typeListItemField">
                List item type
                <select id="typeListItemInput" name="listItemType"></select>
              </label>
              <div class="type-fields">
                <div class="type-fields-header">
                  <span>Fields</span>
                </div>
                <div class="type-field-builder">
                  <input id="typeFieldNameInput" type="text" placeholder="Field name" autocomplete="off" />
                  <select id="typeFieldTypeInput" aria-label="Field type"></select>
                  <button class="plus-button" id="addTypeFieldBtn" type="button" aria-label="Add field">+</button>
                </div>
                <div class="type-field-list" id="typeFieldList"></div>
              </div>
              <div class="editor-actions">
                <button class="primary" id="typeSubmitBtn" type="submit">Create Type</button>
                <button id="newTypeBtn" type="button">New</button>
                <span class="status" id="typeStatus" role="status"></span>
              </div>
            </form>
            <div class="type-list" id="typeList"></div>
          </div>
        </section>

        <section class="view" id="objectsView" aria-labelledby="objectsTitle">
          <div class="view-header">
            <h1 id="objectsTitle">Objects</h1>
            <select id="typeFilter" aria-label="Filter by type"></select>
          </div>
          <div class="object-list" id="objectsList"></div>
        </section>

        <section class="view" id="timelineView" aria-labelledby="timelineTitle">
          <div class="view-header">
            <h1 id="timelineTitle">Timeline</h1>
          </div>
          <div class="timeline-list" id="timelineList"></div>
        </section>
      </main>

      <aside class="editor-panel review-type-panel" aria-label="Review Type assignment">
        <div class="editor-header">
          <div>
            <div class="eyebrow">Review</div>
            <h2 id="editorTitle">No object selected</h2>
          </div>
        </div>
        <form id="objectEditor" class="object-editor"></form>
      </aside>
    </div>

    <div class="command-palette" id="commandPalette" hidden></div>
    <script type="module" src="./js/lifeos.js"></script>
  </body>
</html>
